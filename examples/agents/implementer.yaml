name: implementer
description: Executes an implementation plan, writing real code and tests.
permission_mode: acceptEdits
allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
system_prompt_file: implementer.system.md
max_turns: 60
timeout_seconds: 2700
concurrency: 1
retries:
  max_attempts: 2
  backoff: exponential
can_handoff_to: [reviewer]
