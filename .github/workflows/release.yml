name: Release

on:
  push:
    branches: [main]

# Two pushes landing together must not each try to cut a release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test # a red main never becomes an installable version
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version bump commit and the tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release reads the whole history
          token: ${{ secrets.GITHUB_TOKEN }}

      # Derives the next version from conventional commits since the last tag,
      # writes it into pyproject.toml, commits, tags and publishes the release.
      # A `chore(release):` commit is what it pushes back; that commit carries
      # no feat/fix, so the next run finds nothing to release and stops.
      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
