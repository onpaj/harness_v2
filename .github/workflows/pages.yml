name: Docs

# Build the static HTML drill-down (scripts/build_docs.py) and publish it to
# GitHub Pages on every push to main. The generated site is never committed —
# it is rebuilt from docs/ on each run, matching the generator's design as a
# CI concern rather than a checked-in artifact.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The generator is dependency-free stdlib, so no install step is needed.
      - name: Build the static docs site
        run: python scripts/build_docs.py --out site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
