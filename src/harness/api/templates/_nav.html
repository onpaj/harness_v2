<header class="appbar">
  <span class="appbar__brand"><span class="dot"></span>harness</span>
  <nav class="appbar__links">
    <a href="/" data-section="board">Board</a>
    <a href="/admin/agents" data-section="agents">Agents</a>
    <a href="/admin/workflows" data-section="workflows">Workflows</a>
  </nav>
</header>
<nav class="tabbar" aria-label="Primary">
  <a href="/" data-section="board">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="5" height="16" rx="1"></rect>
      <rect x="10" y="4" width="5" height="10" rx="1"></rect>
      <rect x="17" y="4" width="4" height="13" rx="1"></rect>
    </svg>
    Board
  </a>
  <a href="/admin/agents" data-section="agents">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="4" y="8" width="16" height="12" rx="3"></rect>
      <path d="M12 8V4M9 14h.01M15 14h.01"></path>
    </svg>
    Agents
  </a>
  <a href="/admin/workflows" data-section="workflows">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="6" cy="6" r="2.5"></circle>
      <circle cx="18" cy="18" r="2.5"></circle>
      <path d="M8.5 6H15a3 3 0 0 1 3 3v6.5"></path>
    </svg>
    Workflows
  </a>
</nav>
<script>
  (function () {
    var path = window.location.pathname;
    var section = path.indexOf('/admin/workflows') === 0 ? 'workflows'
      : path.indexOf('/admin/agents') === 0 ? 'agents'
      : path === '/' ? 'board' : '';
    document.querySelectorAll('[data-section]').forEach(function (el) {
      if (el.getAttribute('data-section') === section) { el.classList.add('active'); }
    });
  })();
</script>
