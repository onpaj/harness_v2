<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#141416" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>harness board</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
</head>
<body hx-ext="sse" sse-connect="/api/events">
  {% include "_nav.html" %}
  <main class="page">
    <div class="page-header">
      <h1>Board</h1>
    </div>
    <div id="board" data-revision="{{ board.revision }}" hx-get="/fragment/board" hx-trigger="sse:board" hx-swap="innerHTML">
      {% include "_columns.html" %}
    </div>
  </main>
  <dialog id="detail"></dialog>
  <script>
    document.body.addEventListener('htmx:afterSwap', function (event) {
      if (event.detail.target.id === 'detail') { document.getElementById('detail').showModal(); }
    });
    document.getElementById('detail').addEventListener('click', function (event) {
      if (event.target.id === 'detail') { event.target.close(); }
      if (event.target.classList.contains('task-detail__close')) { event.target.closest('dialog').close(); }
    });
    // Tab switching is pure CSS visibility toggling, never DOM removal, so the
    // Output panel's SSE-connected div stays mounted (and its EventSource stays
    // open) while the user is looking at another tab. Registered on #detail
    // (delegated), not inside _task.html, since the fragment's own markup is
    // wholesale-replaced on every hx-get/hx-post swap and a listener attached
    // to it would be silently discarded.
    document.getElementById('detail').addEventListener('click', function (event) {
      var tab = event.target.closest('.tab');
      if (!tab) { return; }
      var name = tab.getAttribute('data-tab');
      tab.parentElement.querySelectorAll('.tab').forEach(function (el) {
        el.classList.toggle('active', el === tab);
      });
      tab.closest('.task-detail').querySelectorAll('.tab-panel').forEach(function (panel) {
        panel.classList.toggle('active', panel.getAttribute('data-panel') === name);
      });
    });
    // Clearing the modal on close removes the live-output element, which lets
    // the htmx SSE extension tear its EventSource down (htmx:beforeCleanupElement)
    // instead of leaving it streaming to a hidden dialog.
    document.getElementById('detail').addEventListener('close', function (event) {
      event.target.innerHTML = '';
    });

    // Revision de-dup: the client remembers the last rendered revision and
    // skips the swap when it hasn't changed. It must register before htmx
    // processes the hx-trigger on #board (htmx waits for DOMContentLoaded,
    // this script runs while the page is parsed), so that
    // stopImmediatePropagation can stop htmx before it fires /fragment/board.
    (function () {
      var boardEl = document.getElementById('board');
      var initial = parseInt(boardEl.getAttribute('data-revision'), 10);
      var lastRevision = isNaN(initial) ? null : initial;
      boardEl.addEventListener('sse:board', function (event) {
        var raw = event.detail && event.detail.data;
        if (!raw) { return; }
        var revision;
        try {
          revision = JSON.parse(raw).revision;
        } catch (error) {
          return;
        }
        if (revision === lastRevision) {
          event.stopImmediatePropagation();
          return;
        }
        lastRevision = revision;
      });
    })();
  </script>
</body>
</html>
