<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>harness board</title>
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
  <style>
    body { font: 14px system-ui, sans-serif; margin: 0; padding: 16px; background: #f4f5f7; }
    .nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 13px; }
    .nav .brand { font-weight: 600; color: #172b4d; }
    .nav a { color: #0747a6; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    h1 { font-size: 16px; margin: 0 0 16px; }
    .tab-strip { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab { font: inherit; background: none; border: none; border-radius: 4px 4px 0 0; padding: 6px 12px; cursor: pointer; color: #5e6c84; }
    .tab.active { background: #fff; color: #172b4d; font-weight: 500; }
    .board { display: flex; gap: 12px; align-items: flex-start; overflow-x: auto; }
    .column { background: #ebecf0; border-radius: 6px; padding: 8px; min-width: 220px; flex: 1; }
    .column h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin: 4px 4px 8px; color: #5e6c84; }
    .count { color: #97a0af; font-weight: normal; }
    .card { background: #fff; border-radius: 4px; box-shadow: 0 1px 1px rgba(9,30,66,.25); padding: 8px; margin-bottom: 8px; cursor: pointer; }
    .card .title { font-size: 13px; font-weight: 500; }
    .card .repo { color: #5e6c84; font-size: 12px; font-family: ui-monospace, monospace; }
    .card .since { color: #97a0af; font-size: 11px; margin-top: 2px; }
    .badge { display: inline-block; font-size: 11px; border-radius: 3px; padding: 1px 6px; margin-top: 6px; margin-right: 4px; }
    .badge.done { background: #e3fcef; color: #006644; }
    .badge.request_changes { background: #fffae6; color: #974f0c; }
    .badge.working { background: #deebff; color: #0747a6; }
    dialog { border: none; border-radius: 6px; padding: 0; max-width: none; width: 96vw; height: 92vh; }
    dialog[open] { display: flex; flex-direction: column; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    td, th { text-align: left; padding: 4px 8px; border-bottom: 1px solid #ebecf0; vertical-align: top; }
    .status-bar { margin-top: 16px; padding-top: 8px; border-top: 1px solid #dfe1e6; color: #97a0af; font-size: 11px; font-family: ui-monospace, monospace; }
    .task-detail { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .task-detail__header {
      display: flex; align-items: center; gap: 8px; padding: 12px 16px;
      border-bottom: 1px solid #ebecf0; flex: 0 0 auto;
    }
    .task-detail__header h2 { font-size: 14px; margin: 0; flex: 1; font-family: ui-monospace, monospace; }
    .task-detail__close { border: none; background: none; font-size: 16px; cursor: pointer; padding: 4px 8px; }
    .tabs { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid #ebecf0; flex: 0 0 auto; }
    .tab {
      border: none; background: none; cursor: pointer; padding: 8px 12px; font: 13px system-ui, sans-serif;
      color: #5e6c84; border-bottom: 2px solid transparent;
    }
    .tab.active { color: #0747a6; border-bottom-color: #0747a6; font-weight: 500; }
    .tab-panels { flex: 1; min-height: 0; overflow: auto; padding: 16px; display: flex; flex-direction: column; }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    @media (max-width: 767px) {
      .column { min-width: 85vw; flex: 0 0 auto; }
      .card { padding: 12px 10px; }
      dialog { width: 94vw; max-width: 94vw; height: 90vh; }
      .tabs { overflow-x: auto; }
      .tab-panels { padding: 12px; }
    }
  </style>
</head>
<body hx-ext="sse" sse-connect="/api/events">
  {% include "_nav.html" %}
  <h1>harness board</h1>
  <div id="board"
       data-revision="{{ board.revision }}"
       data-active-workflow="{{ board.default_tab() or '' }}"
       hx-get="/fragment/board" hx-trigger="sse:board" hx-swap="innerHTML">
    {% include "_columns.html" %}
  </div>
  <dialog id="detail"></dialog>
  <footer class="status-bar">harness {{ version }} · built {{ build_time or "unknown" }}</footer>
  <script>
    function applyActiveTab(boardEl) {
      var active = boardEl.getAttribute('data-active-workflow');
      boardEl.querySelectorAll('.tab').forEach(function (el) {
        el.classList.toggle('active', el.dataset.workflow === active);
      });
      boardEl.querySelectorAll('.workflow-panel').forEach(function (el) {
        el.style.display = (el.dataset.workflow === active) ? '' : 'none';
      });
    }
    document.getElementById('board').addEventListener('click', function (event) {
      var tab = event.target.closest('.tab');
      if (!tab) { return; }
      var boardEl = document.getElementById('board');
      boardEl.setAttribute('data-active-workflow', tab.dataset.workflow);
      applyActiveTab(boardEl);
    });
    applyActiveTab(document.getElementById('board'));

    document.body.addEventListener('htmx:afterSwap', function (event) {
      if (event.detail.target.id === 'board') { applyActiveTab(event.detail.target); }
      if (event.detail.target.id === 'detail') { document.getElementById('detail').showModal(); }
    });
    document.getElementById('detail').addEventListener('click', function (event) {
      if (event.target.id === 'detail') { event.target.close(); }
    });
    document.getElementById('detail').addEventListener('click', function (event) {
      if (event.target.classList.contains('task-detail__close')) { event.target.closest('dialog').close(); }
    });
    // Tab switching is pure CSS visibility toggling, never DOM removal, so the
    // Output panel's SSE-connected div stays mounted (and its EventSource stays
    // open) while the user is looking at another tab.
    document.getElementById('detail').addEventListener('click', function (event) {
      var tab = event.target.closest('.tab');
      if (!tab) { return; }
      var name = tab.getAttribute('data-tab');
      tab.parentElement.querySelectorAll('.tab').forEach(function (el) {
        el.classList.toggle('active', el === tab);
      });
      tab.closest('.task-detail').querySelectorAll('.tab-panel').forEach(function (panel) {
        panel.classList.toggle('active', panel.getAttribute('data-panel') === name);
      });
    });
    // Clearing the modal on close removes the live-output element, which lets
    // the htmx SSE extension tear its EventSource down (htmx:beforeCleanupElement)
    // instead of leaving it streaming to a hidden dialog.
    document.getElementById('detail').addEventListener('close', function (event) {
      event.target.innerHTML = '';
    });

    // Revision de-dup: the client remembers the last rendered revision and
    // skips the swap when it hasn't changed. It must register before htmx
    // processes the hx-trigger on #board (htmx waits for DOMContentLoaded,
    // this script runs while the page is parsed), so that
    // stopImmediatePropagation can stop htmx before it fires /fragment/board.
    (function () {
      var boardEl = document.getElementById('board');
      var initial = parseInt(boardEl.getAttribute('data-revision'), 10);
      var lastRevision = isNaN(initial) ? null : initial;
      boardEl.addEventListener('sse:board', function (event) {
        var raw = event.detail && event.detail.data;
        if (!raw) { return; }
        var revision;
        try {
          revision = JSON.parse(raw).revision;
        } catch (error) {
          return;
        }
        if (revision === lastRevision) {
          event.stopImmediatePropagation();
          return;
        }
        lastRevision = revision;
      });
    })();
  </script>
</body>
</html>
