<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>harness board — workflow {{ name }}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  {% include "_nav.html" %}
  <main class="page">
    <a class="back-link" href="/admin/workflows">&larr; back to workflows</a>
    <div class="page-header">
      <h1>{{ "New workflow" if is_new else "Workflow: " + name }}</h1>
    </div>

    <form class="form-card" method="post"
          action="{{ '/admin/workflows' if is_new else '/admin/workflows/' + name }}">
      {% if is_new %}
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ name }}" autofocus>
      </div>
      {% endif %}

      <div class="field">
        <label for="text">Definition (raw JSON)</label>
        <textarea id="text" name="text" rows="20">{{ text }}</textarea>
      </div>

      <div class="form-actions">
        <button class="btn primary" type="submit">Save</button>
        {% if not is_new %}
        <button class="btn danger" type="submit"
                formaction="/admin/workflows/{{ name }}/delete"
                formnovalidate
                onclick="return confirm('Delete workflow {{ name }}?');">Delete</button>
        {% endif %}
      </div>
    </form>

    {% if error %}
    <div class="banner error">{{ error }}</div>
    {% endif %}
    {% if saved %}
    <div class="banner success">saved</div>
    {% endif %}
    {% for warning in warnings %}
    <div class="banner warning">{{ warning }}</div>
    {% endfor %}
  </main>
</body>
</html>
