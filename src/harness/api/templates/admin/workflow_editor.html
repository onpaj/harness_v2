<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#141416" media="(prefers-color-scheme: dark)">
  <title>harness — workflow {{ name }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {% include "_nav.html" %}
  <main class="page">
    <a class="back" href="/admin/workflows">‹ Workflows</a>
    <div class="page-header">
      <h1>{% if is_new %}New workflow{% else %}{{ name }}{% endif %}</h1>
    </div>
    <div class="form-card">
      <form method="post" action="{{ '/admin/workflows' if is_new else '/admin/workflows/' + name }}">
        {% if is_new %}
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" value="{{ name }}" autofocus>
        </div>
        {% endif %}

        <div class="field">
          <label for="text">Definition (raw JSON)</label>
          <textarea class="editor" id="text" name="text" rows="18" spellcheck="false" autocapitalize="off" autocorrect="off">{{ text }}</textarea>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">Save</button>
          {% if not is_new %}
          <button class="btn danger" type="submit"
                  formaction="/admin/workflows/{{ name }}/delete"
                  formnovalidate
                  onclick="return confirm('Delete workflow {{ name }}?');">Delete</button>
          {% endif %}
        </div>
      </form>
    </div>
    {% if error %}
    <div class="banner error">{{ error }}</div>
    {% endif %}
    {% if saved %}
    <div class="banner success">saved</div>
    {% endif %}
    {% for warning in warnings %}
    <div class="banner warning">{{ warning }}</div>
    {% endfor %}
  </main>
</body>
</html>
