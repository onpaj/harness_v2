<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#141416" media="(prefers-color-scheme: dark)">
  <title>harness — agents</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {% include "_nav.html" %}
  <main class="page">
    <div class="page-header">
      <h1>Agents</h1>
      <div class="spacer"></div>
      <a class="btn primary small" href="/admin/agents/new">+ New</a>
    </div>
    {% if names %}
    <div class="list-card">
      {% for name in names %}
      <a class="row" href="/admin/agents/{{ name }}">{{ name }}<span class="chevron">›</span></a>
      {% endfor %}
    </div>
    {% else %}
    <div class="list-card"><div class="empty">No agents defined yet.</div></div>
    {% endif %}
  </main>
</body>
</html>
