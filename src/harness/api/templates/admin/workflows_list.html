<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>harness board — workflows</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  {% include "_nav.html" %}
  <main class="page">
    <div class="page-header">
      <h1>Workflows</h1>
      <a class="btn small primary" href="/admin/workflows/new">+ new workflow</a>
    </div>
    {% if names %}
    <div class="list-card">
      {% for name in names %}
      <a class="row" href="/admin/workflows/{{ name }}">{{ name }}</a>
      {% endfor %}
    </div>
    {% else %}
    <div class="list-card"><div class="list-empty">No workflows defined yet.</div></div>
    {% endif %}
  </main>
</body>
</html>
