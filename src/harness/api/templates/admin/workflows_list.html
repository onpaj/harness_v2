<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>harness board — workflows</title>
  <style>
    body { font: 14px system-ui, sans-serif; margin: 0; padding: 16px; background: #f4f5f7; }
    .nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 13px; }
    .nav .brand { font-weight: 600; color: #172b4d; }
    .nav a { color: #0747a6; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    h1 { font-size: 16px; margin: 0 0 16px; display: flex; justify-content: space-between; align-items: center; }
    .card { background: #fff; border-radius: 4px; box-shadow: 0 1px 1px rgba(9,30,66,.25); padding: 8px 0; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    td, th { text-align: left; padding: 6px 12px; border-bottom: 1px solid #ebecf0; }
    a.new { font-size: 13px; }
    .empty { color: #5e6c84; padding: 12px; }
  </style>
</head>
<body>
  {% include "_nav.html" %}
  <h1>Workflows <a class="new" href="/admin/workflows/new">+ new workflow</a></h1>
  <div class="card">
    {% if names %}
    <table>
      {% for name in names %}
      <tr><td><a href="/admin/workflows/{{ name }}">{{ name }}</a></td></tr>
      {% endfor %}
    </table>
    {% else %}
    <div class="empty">No workflows defined yet.</div>
    {% endif %}
  </div>
</body>
</html>
