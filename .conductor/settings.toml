"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Postaví izolované venv a nainstaluje harness v editable režimu i s dev
# závislostmi (pytest). Na stroji není `uv` — plain venv + pip (viz CLAUDE.md).
# python3.11 se hledá na PATH, s fallbackem na ~/.local/bin (non-interaktivní
# zsh nemusí mít .local/bin na PATH). Root harnessu je per-workspace, aby si
# paralelní workspaces nešláply na sdílenou frontu.
setup = """
set -e
PY="$(command -v python3.11 || echo "$HOME/.local/bin/python3.11")"
"$PY" -m venv .venv
.venv/bin/python -m pip install --quiet --upgrade pip
.venv/bin/python -m pip install --quiet -e ".[dev]"
.venv/bin/harness init --root "$CONDUCTOR_WORKSPACE_PATH/.harness"
# repos.json je machine-specific (jméno repa → cesta ke klonu). `harness init`
# ho založí prázdný jen když chybí; tady ho vždy naplníme oběma repy, se
# kterými harness na tomhle stroji pracuje. Klony leží pod ~/Work/GitHub.
GH="$HOME/Work/GitHub"
cat > "$CONDUCTOR_WORKSPACE_PATH/.harness/repos.json" <<EOF
{
  "harness_v2": "$GH/harness_v2",
  "heblo": "$GH/Anela.Heblo"
}
EOF
"""

# Každý workspace má vlastní root → smyčky se navzájem neruší.
run_mode = "concurrent"

# Spustí orchestrační smyčku. Běží dopředu a pollује frontu dokud ji Conductor
# nezastaví (SIGHUP → smyčka čistě skončí). Root musí být inicializovaný ze
# setup scriptu výše.
#
# GitHub zdroj: `--github-repo onpaj/Anela.Heblo` zapne ingesci issue s labelem
# `harness:todo`. Token se bere za běhu z `gh` (žádný secret v souboru); zdroj
# se sám vypne, když `GITHUB_TOKEN` chybí. `--poll 5` drží interval pollování
# nízko — GitHubí `list_issues` čte s lagem, tak nemá smysl bušit každých 0.2 s
# (in-process dedup ve zdroji navíc chrání před dvojitým claimem).
[scripts.run.loop]
command = 'GITHUB_TOKEN="$(gh auth token)" .venv/bin/harness run --root "$CONDUCTOR_WORKSPACE_PATH/.harness" --github-repo onpaj/Anela.Heblo --poll 5'
default = true
icon = "play"
