"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Builds an isolated venv and installs harness in editable mode along with the
# dev dependencies (pytest). There is no `uv` on the machine — plain venv + pip
# (see CLAUDE.md). python3.11 is looked up on PATH, with a fallback to
# ~/.local/bin (a non-interactive zsh may not have .local/bin on PATH). The
# harness root is per-workspace, so parallel workspaces don't step on a shared
# queue.
setup = """
set -e
PY="$(command -v python3.11 || echo "$HOME/.local/bin/python3.11")"
"$PY" -m venv .venv
.venv/bin/python -m pip install --quiet --upgrade pip
.venv/bin/python -m pip install --quiet -e ".[dev]"
.venv/bin/harness init --root "$CONDUCTOR_WORKSPACE_PATH/.harness"
"""

# Each workspace has its own root → the loops don't interfere with each other.
run_mode = "concurrent"

# Runs the orchestration loop. It runs forward and polls the queue until
# Conductor stops it (SIGHUP → the loop exits cleanly). The root must have been
# initialized by the setup script above.
#
# GitHub source: `--github-repo onpaj/Anela.Heblo` turns on ingestion of issues
# labeled `harness:todo`. The token is taken at runtime from `gh` (no secret in
# the file); the source disables itself when `GITHUB_TOKEN` is missing. `--poll 5`
# keeps the poll interval low — GitHub's `list_issues` reads with lag, so there's
# no point hammering it every 0.2 s (in-process dedup in the source also guards
# against a double claim).
[scripts.run.loop]
command = 'GITHUB_TOKEN="$(gh auth token)" .venv/bin/harness run --root "$CONDUCTOR_WORKSPACE_PATH/.harness" --github-repo onpaj/Anela.Heblo --poll 5'
default = true
icon = "play"
