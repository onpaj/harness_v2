"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Builds an isolated venv and installs harness in editable mode along with the
# dev dependencies (pytest). There is no `uv` on the machine — plain venv + pip
# (see CLAUDE.md). python3.11 is looked up on PATH, with a fallback to
# ~/.local/bin (a non-interactive zsh may not have .local/bin on PATH). The
# harness root is per-workspace, so parallel workspaces don't step on a shared
# queue.
setup = """
set -e
PY="$(command -v python3.11 || echo "$HOME/.local/bin/python3.11")"
"$PY" -m venv .venv
.venv/bin/python -m pip install --quiet --upgrade pip
.venv/bin/python -m pip install --quiet -e ".[dev]"
.venv/bin/harness init --root "$CONDUCTOR_WORKSPACE_PATH/.harness"
# repos.json is machine-specific (repo name → path to the clone). `harness init`
# creates it empty only when missing; here we always fill it with both repos the
# harness works with on this machine. The clones live under ~/Work/GitHub.
GH="$HOME/Work/GitHub"
cat > "$CONDUCTOR_WORKSPACE_PATH/.harness/repos.json" <<EOF
{
  "harness_v2": "$GH/harness_v2",
  "heblo": "$GH/Anela.Heblo"
}
EOF
"""

# Each workspace has its own root → the loops don't interfere with each other.
run_mode = "concurrent"

# GitHub source: with GITHUB_TOKEN present, the harness scans EVERY repo in
# repos.json (currently harness_v2 and heblo) for issues labeled `harness:todo`.
# Each repo's owner/name slug is derived from its clone's git origin. The token
# is taken at runtime from `gh` (no secret in the file); without it the harness
# runs on `harness submit` alone. GitHub is polled on its own interval
# (`--source-poll`, default 30 s) so it doesn't hit API rate limits, while the
# internal loop stays fast for a responsive board.
[scripts.run.loop]
command = 'GITHUB_TOKEN="$(gh auth token)" .venv/bin/harness run --root "$CONDUCTOR_WORKSPACE_PATH/.harness"'
default = true
icon = "play"
